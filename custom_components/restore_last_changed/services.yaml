dump:
  name: Dump entity state vs. recorder
  description: >-
    Logs, at WARNING level, the entity's current state-machine timestamps next
    to the most recent historical state from the recorder. Use this to see
    whether the recorder has the data we expect before calling restore.
  fields:
    entity_id:
      name: Entity
      description: The entity_id to inspect.
      required: true
      example: sensor.my_sensor
      selector:
        entity: {}

restore:
  name: Restore last_changed for one entity
  description: >-
    Attempts to restore last_changed/last_updated for a single entity using the
    selected strategy, with verbose logging so the result can be verified in
    Developer Tools -> States.
  fields:
    entity_id:
      name: Entity
      description: The entity_id to restore.
      required: true
      example: sensor.my_sensor
      selector:
        entity: {}
    strategy:
      name: Strategy
      description: >-
        Which restoration technique to try.
        async_set calls the public API (likely deduped by HA).
        async_set_force adds force_update=True.
        mutate changes the live State object in place (bypasses dedup).
        replace drops a freshly built State into hass.states internals.
      required: false
      default: mutate
      example: mutate
      selector:
        select:
          options:
            - async_set
            - async_set_force
            - mutate
            - replace
